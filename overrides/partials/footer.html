<footer class="md-footer">
  {% if page and (page.previous_page or page.next_page) %}
  <nav class="md-footer__inner md-grid md-footer-nav pg-prevnext" aria-label="Page navigation">
    {% if page.previous_page %}
      <a href="{{ page.previous_page.url | url }}"
         class="md-footer__link md-footer__link--prev"
         rel="prev">
        <div class="md-footer__button md-icon">
          {% include ".icons/material/arrow-left.svg" %}
        </div>
        <div class="md-footer__title">
          <div class="md-ellipsis">{{ page.previous_page.title }}</div>
        </div>
      </a>
    {% endif %}
    {% if page.next_page %}
      <a href="{{ page.next_page.url | url }}"
         class="md-footer__link md-footer__link--next"
         rel="next">
        <div class="md-footer__title">
          <div class="md-ellipsis">{{ page.next_page.title }}</div>
        </div>
        <div class="md-footer__button md-icon">
          {% include ".icons/material/arrow-right.svg" %}
        </div>
      </a>
    {% endif %}
  </nav>
  {% endif %}

  <footer class="main-footer">
    <div class="container">
      <div class="logo-group">
        <a href="https://www.iiama.upv.es/" target="_blank" rel="noopener">
          <img src="{{ base_url }}/assets/images/footer/logo_iiama-removebg.png" alt="IIAMA logo" class="footer-img iiama-logo">
        </a>
        <a href="https://vrain.upv.es/" target="_blank" rel="noopener">
          <img src="{{ base_url }}/assets/images/footer/vrain_white_1.png" alt="VRAIN logo" class="footer-img vrain-logo">
        </a>
        <a href="https://pgtec-vrain.github.io/" target="_blank" rel="noopener">
          <img src="{{ base_url }}/assets/images/footer/logo_upv2.png" alt="PGTEC VRAIN logo" class="footer-img pgtec-logo">
        </a>
        <a href="https://avance.digital.gob.es/" target="_blank" rel="noopener">
          <img src="{{ base_url }}/assets/images/footer/logo_MTDFP-SEDIA.png" alt="SEDIA" class="footer-img sedia-logo">
        </a>
        <a href="https://next-generation-eu.europa.eu/" target="_blank" rel="noopener">
          <img src="{{ base_url }}/assets/images/footer/logo_eu.png" alt="NextGenerationEU" class="footer-img eu-logo">
        </a>
        <a href="https://cindi.gva.es/" target="_blank" rel="noopener">
          <img src="{{ base_url }}/assets/images/footer/logo_PRTR_3.png" alt="GVA Logo" class="footer-img gva-logo">
        </a>
      </div>
    </div>
  </footer>
</footer>
